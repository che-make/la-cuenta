<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>La Cuenta · Divide gastos entre amigos</title>
  <meta name="description" content="Divide gastos en euros entre amigos: varios eventos, mini-eventos/sitios, participantes y reparto claro de quién paga qué." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A7%BE%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <!-- ===== Barra superior ===== -->
  <header id="app-header" class="app-header">
    <div class="app-header-inner">
      <div class="brand">
        <span class="brand-emoji" aria-hidden="true">🧾</span>
        <span class="brand-name">La Cuenta</span>
      </div>

      <div class="event-picker">
        <select id="event-select" class="input event-select" aria-label="Evento actual"></select>
        <button id="btn-edit-event" class="icon-btn" type="button" title="Editar evento">✏️</button>
        <button id="btn-new-event" class="icon-btn" type="button" title="Nuevo evento">＋</button>
      </div>

      <div id="auth-area" class="auth-area"><!-- login / usuario (lo rellena app.js) --></div>
    </div>
  </header>

  <!-- ===== Aviso de solo lectura (invitados) ===== -->
  <div id="readonly-banner" class="readonly-banner" hidden>
    👀 Modo lectura. Inicia sesión (arriba a la derecha) para editar.
  </div>

  <!-- ===== Pestañas ===== -->
  <nav id="tabs" class="tabs" aria-label="Secciones">
    <button class="tab" data-view="resumen" type="button">Resumen</button>
    <button class="tab" data-view="gastos" type="button">Gastos</button>
    <button class="tab" data-view="amigos" type="button">Amigos</button>
    <button class="tab" data-view="sitios" type="button">Sitios</button>
  </nav>

  <!-- ===== Contenedores de vista ===== -->
  <main class="container">
    <section id="view-resumen" class="view" hidden></section>
    <section id="view-gastos" class="view" hidden></section>
    <section id="view-amigos" class="view" hidden></section>
    <section id="view-sitios" class="view" hidden></section>

    <!-- Estado vacío global cuando no hay ningún evento -->
    <section id="no-event" class="empty-state" hidden></section>
  </main>

  <!-- ===== Raíces de overlays ===== -->
  <div id="modal-root"></div>
  <div id="toast-root" class="toast-root"></div>

  <footer class="credits">La Cuenta · divide gastos sin discusiones</footer>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
